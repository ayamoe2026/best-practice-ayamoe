<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วิธีการปฏิบัติที่เป็นเลิศ (best practice)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .portfolio-card { cursor: pointer; transition: 0.3s; }
        .portfolio-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; margin-bottom: 15px;}
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">📚 วิธีการปฏิบัติที่เป็นเลิศ (best practice)</a>
        <a class="btn btn-outline-light btn-sm" href="admin.html">สำหรับผู้ดูแลระบบ</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <h4 class="text-primary border-bottom pb-2">Administration</h4>
            <div id="list-Administration" class="mt-3"></div>
        </div>
        <div class="col-md-4">
            <h4 class="text-success border-bottom pb-2">Teaching</h4>
            <div id="list-Teaching" class="mt-3"></div>
        </div>
        <div class="col-md-4">
            <h4 class="text-warning border-bottom pb-2">Supervision</h4>
            <div id="list-Supervision" class="mt-3"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="portfolioModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">รายละเอียดผลงาน</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p><strong>ตำแหน่ง:</strong> <span id="modalPosition"></span> | <strong>ปีการศึกษา:</strong> <span id="modalYear"></span></p>
                
                <h6 class="mt-3">🎬 วิดีโอแนะนำตัว/ผลงาน</h6>
                <div class="iframe-container" id="videoContainer">
                    <iframe id="youtubeFrame" allowfullscreen></iframe>
                </div>

                <h6 class="mt-4">📄 เอกสารผลงาน (PDF)</h6>
                <div class="iframe-container" style="padding-bottom: 141%;" id="pdfContainer">
                    <iframe id="pdfFrame"></iframe>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔴 นำ Firebase Config ของคุณมาใส่ตรงนี้ 🔴
    const firebaseConfig = {
	
		  apiKey: "AIzaSyCKtwVNT67_OWppZAy42j5qXFtiArhBDx0",
		  authDomain: "best-practice-ayamoe.firebaseapp.com",
		  projectId: "best-practice-ayamoe",
		  storageBucket: "best-practice-ayamoe.firebasestorage.app",
		  messagingSenderId: "242870125166",
		  appId: "1:242870125166:web:064c9892d9b8ec4fd15c7f",
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ดึงข้อมูลแบบ Real-time
    onSnapshot(collection(db, "portfolios"), (snapshot) => {
        // เคลียร์ข้อมูลเก่าก่อนเรนเดอร์ใหม่
        document.getElementById('list-Administration').innerHTML = '';
        document.getElementById('list-Teaching').innerHTML = '';
        document.getElementById('list-Supervision').innerHTML = '';

        snapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'card portfolio-card mb-3';
            card.innerHTML = `
                <div class="card-body">
                    <h5 class="card-title">${data.fullName}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">${data.position}</h6>
                    <small>ปีการศึกษา: ${data.academicYear}</small>
                </div>
            `;

            // เมื่อคลิกที่การ์ด ให้เปิด Modal
            card.onclick = () => openModal(data);

            // นำไปใส่ในคอลัมน์ตาม category
            const container = document.getElementById(`list-${data.category}`);
            if(container) container.appendChild(card);
        });
    });

    // ฟังก์ชันจัดการ Modal
    const portfolioModal = new bootstrap.Modal(document.getElementById('portfolioModal'));
    
    function openModal(data) {
        document.getElementById('modalTitle').innerText = data.fullName;
        document.getElementById('modalPosition').innerText = data.position;
        document.getElementById('modalYear').innerText = data.academicYear;

        // แปลง URL ให้เป็นรูปแบบ Embed
        const ytEmbedUrl = convertYouTubeUrl(data.videoUrl);
        const pdfEmbedUrl = convertDriveUrl(data.pdfUrl);

        document.getElementById('youtubeFrame').src = ytEmbedUrl;
        document.getElementById('pdfFrame').src = pdfEmbedUrl;

        portfolioModal.show();
    }

    // หยุดวิดีโอเมื่อปิด Modal
    document.getElementById('portfolioModal').addEventListener('hidden.bs.modal', function () {
        document.getElementById('youtubeFrame').src = '';
        document.getElementById('pdfFrame').src = '';
    });

    // Helper: แปลงลิงก์ YouTube ปกติเป็น Embed
    function convertYouTubeUrl(url) {
        if (!url) return '';
        let videoId = '';
        if (url.includes('youtube.com/watch?v=')) {
            videoId = new URL(url).searchParams.get('v');
        } else if (url.includes('youtu.be/')) {
            videoId = url.split('youtu.be/')[1].split('?')[0];
        }
        return videoId ? `https://www.youtube.com/embed/${videoId}` : '';
    }

    // Helper: แปลงลิงก์ Google Drive ปกติเป็น Preview
    function convertDriveUrl(url) {
        if (!url) return '';
        return url.replace('/view', '/preview').replace('?usp=sharing', '');
    }
</script>
</body>
</html>
