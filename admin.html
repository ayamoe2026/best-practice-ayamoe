<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการระบบ - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">⬅️ กลับหน้าหลัก</a>
        <button id="btnLogout" class="btn btn-danger btn-sm d-none">ออกจากระบบ</button>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    
    <div id="loginSection" class="card shadow">
        <div class="card-header bg-primary text-white">เข้าสู่ระบบสำหรับแอดมิน</div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
                <div id="loginError" class="text-danger mt-2 text-center"></div>
            </form>
        </div>
    </div>

    <div id="adminSection" class="card shadow d-none">
        <div class="card-header bg-success text-white">➕ เพิ่มข้อมูล Portfolio</div>
        <div class="card-body">
            <form id="portfolioForm">
                <div class="mb-3">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>หมวดหมู่ (Category)</label>
                    <select id="category" class="form-select" required>
                        <option value="">-- เลือกหมวดหมู่ --</option>
                        <option value="Administration">Administration (บริหาร)</option>
                        <option value="Teaching">Teaching (การสอน)</option>
                        <option value="Supervision">Supervision (นิเทศ)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>ตำแหน่ง</label>
                    <input type="text" id="position" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>ปีการศึกษา</label>
                    <input type="text" id="academicYear" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>ลิงก์ YouTube</label>
                    <input type="url" id="videoUrl" class="form-control" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                <div class="mb-3">
                    <label>ลิงก์ Google Drive PDF</label>
                    <input type="url" id="pdfUrl" class="form-control" placeholder="https://drive.google.com/file/d/.../view">
                </div>
                <button type="submit" class="btn btn-success w-100">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔴 นำ Firebase Config ของคุณมาใส่ตรงนี้ (ชุดเดียวกับ index.html) 🔴
    const firebaseConfig = {
		  apiKey: "AIzaSyCKtwVNT67_OWppZAy42j5qXFtiArhBDx0",
		  authDomain: "best-practice-ayamoe.firebaseapp.com",
		  projectId: "best-practice-ayamoe",
		  storageBucket: "best-practice-ayamoe.firebasestorage.app",
		  messagingSenderId: "242870125166",
		  appId: "1:242870125166:web:064c9892d9b8ec4fd15c7f",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // การจัดการหน้าจอตามสถานะ Login
    const loginSection = document.getElementById('loginSection');
    const adminSection = document.getElementById('adminSection');
    const btnLogout = document.getElementById('btnLogout');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // ล็อกอินแล้ว แสดงฟอร์มแอดมิน ซ่อนฟอร์มล็อกอิน
            loginSection.classList.add('d-none');
            adminSection.classList.remove('d-none');
            btnLogout.classList.remove('d-none');
        } else {
            // ยังไม่ล็อกอิน
            loginSection.classList.remove('d-none');
            adminSection.classList.add('d-none');
            btnLogout.classList.add('d-none');
        }
    });

    // ระบบ Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            document.getElementById('loginError').innerText = '';
        } catch (error) {
            document.getElementById('loginError').innerText = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        }
    });

    // ระบบ Logout
    btnLogout.addEventListener('click', () => {
        signOut(auth);
    });

    // ระบบบันทึกข้อมูลลง Firestore
    document.getElementById('portfolioForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newData = {
            fullName: document.getElementById('fullName').value,
            category: document.getElementById('category').value,
            position: document.getElementById('position').value,
            academicYear: document.getElementById('academicYear').value,
            videoUrl: document.getElementById('videoUrl').value,
            pdfUrl: document.getElementById('pdfUrl').value,
            createdAt: new Date()
        };

        try {
            await addDoc(collection(db, "portfolios"), newData);
            alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
            document.getElementById('portfolioForm').reset();
        } catch (error) {
            alert("เกิดข้อผิดพลาดในการบันทึก: " + error.message);
        }
    });
</script>
</body>
</html>
